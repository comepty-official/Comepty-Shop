{% extends "base.html" %}
{% load i18n %}

{% block content %}
<div class="auth-page" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
  <div class="auth-card" style="background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); padding: 40px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); text-align: center; max-width: 400px; width: 100%;">
    <div class="auth-header" style="margin-bottom: 24px;">
      <span class="auth-logo" style="font-size: 24px; font-weight: bold; color: #fff;">⚡ Comepty</span>
      <h1 style="font-size: 22px; margin-top: 16px; color: #fff;">Sign In Via Google</h1>
      <p style="color: #aaa; font-size: 14px; margin-top: 8px;">You are about to sign in using a third-party account from Google.</p>
    </div>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn-google" style="width: 100%; padding: 12px; background: #fff; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer;">
        {% trans "Continue" %}
      </button>
    </form>
  </div>
</div>
{% endblock %}
